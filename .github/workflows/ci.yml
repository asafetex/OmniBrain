name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omnibrain-triad
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Run ruff
        run: ruff check tools/ tests/ bootstrap.py

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: omnibrain-triad
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pytest>=8.0.0"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/omnibrain-triad" >> $GITHUB_ENV

      - name: Run tests
        run: pytest tests/ -v
